<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام كشف السفن - مضيق سنغافورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .upload-section {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .upload-section:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-block;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .upload-btn:hover {
            transform: scale(1.05);
        }
        .search-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        .search-btn:hover {
            transform: scale(1.05);
        }
        .results {
            margin-top: 30px;
            display: none;
        }
        .result-image {
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .ships-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .ship-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .ship-card img {
            max-width: 100%;
            border-radius: 8px;
        }
        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚢 نظام كشف السفن بالذكاء الاصطناعي</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">
            مضيق سنغافورة - تحليل صور الأقمار الصناعية
        </p>
        
        <div class="upload-section">
            <label for="fileInput" class="upload-btn">
                📷 اختر صورة قمر صناعي
            </label>
            <input type="file" id="fileInput" accept="image/*">
            <p style="margin-top: 20px; color: #666;">أو اسحب الصورة هنا</p>
        </div>
        
        <div style="text-align: center;">
            <button class="search-btn" onclick="searchRecentImages()">
                🔍 البحث في صور آخر 60 يوم
            </button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 20px; color: #667eea;">جاري التحليل...</p>
        </div>
        
        <div class="results" id="results">
            <div class="stats" id="stats"></div>
            <img id="resultImage" class="result-image" src="" alt="نتيجة التحليل">
            <h3 style="margin-top: 30px; color: #667eea;">السفن المكتشفة:</h3>
            <div class="ships-grid" id="shipsGrid"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            loading.style.display = 'block';
            results.style.display = 'none';
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loading.style.display = 'none';
                
                if (data.success) {
                    document.getElementById('resultImage').src = data.result_image;
                    document.getElementById('stats').innerHTML = `
                        <h2>تم اكتشاف ${data.ships_count} سفينة!</h2>
                    `;
                    
                    const shipsGrid = document.getElementById('shipsGrid');
                    shipsGrid.innerHTML = '';
                    data.ships.forEach((ship, index) => {
                        shipsGrid.innerHTML += `
                            <div class="ship-card">
                                <img src="${ship.image_path}" alt="سفينة ${index + 1}">
                                <p>سفينة ${index + 1}</p>
                                <p>الثقة: ${(ship.confidence * 100).toFixed(1)}%</p>
                            </div>
                        `;
                    });
                    
                    results.style.display = 'block';
                } else {
                    alert('حدث خطأ: ' + data.error);
                }
            } catch (error) {
                loading.style.display = 'none';
                alert('خطأ في الاتصال: ' + error.message);
            }
        });
        
        async function searchRecentImages() {
            loading.style.display = 'block';
            results.style.display = 'none';
            
            try {
                const response = await fetch('/search_last_60_days', {
                    method: 'POST'
                });
                
                const data = await response.json();
                loading.style.display = 'none';
                
                if (data.success) {
                    alert(`تم العثور على ${data.count} صورة من آخر 60 يوم`);
                } else {
                    alert('خطأ: ' + data.error);
                }
            } catch (error) {
                loading.style.display = 'none';
                alert('خطأ: ' + error.message);
            }
        }
        
        // Drag and drop
        const uploadSection = document.querySelector('.upload-section');
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.style.background = '#f8f9ff';
        });
        
        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.style.background = '';
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
